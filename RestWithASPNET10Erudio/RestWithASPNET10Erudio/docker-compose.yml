services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "@adminadmin123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - erudio-network
    restart: unless-stopped

  rest-with-asp-net-10-erudio:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: rest-api-app
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__MySQLServerSqlConnectionStrings=Data Source=sqlserver,1433;Initial Catalog=asp_net_10_erudio;User ID=sa;Password=@adminadmin123;Encrypt=false;TrustServerCertificate=True;
    depends_on:
      - sqlserver
    ports:
      - "8080:8080"
    networks:
      - erudio-network
    restart: unless-stopped

networks:
  erudio-network:
    driver: bridge

volumes:
  sqlserver_data: